{% extends "base.html" %}
{% block title %}파일 보기{% endblock %}
{% block content %}
<div class="container" style="max-width:900px;margin:32px auto;padding:0 16px;">
  <h2 style="margin-bottom:20px;">📁 다운로드 파일 보기</h2>
  <table style="width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.1);">
    <thead style="background:#2c3e50;color:white;">
      <tr>
        <th style="padding:12px 16px;text-align:left;">도매처</th>
        <th style="padding:12px 16px;text-align:center;">파일 수</th>
        <th style="padding:12px 16px;text-align:center;">최근 수집</th>
        <th style="padding:12px 16px;text-align:center;">보기</th>
      </tr>
    </thead>
    <tbody>
      {% for f in folders %}
      <tr style="border-bottom:1px solid #eee;">
        <td style="padding:12px 16px;">{{ f.name }} <span style="color:#999;font-size:12px;">({{ f.code }})</span></td>
        <td style="padding:12px 16px;text-align:center;">{{ f.file_count }}</td>
        <td style="padding:12px 16px;text-align:center;">{{ f.latest }}</td>
        <td style="padding:12px 16px;text-align:center;">
          {% if f.file_count > 0 %}
          <a href="/downloads/{{ f.code }}" style="color:#2980b9;">목록 보기</a>
          {% else %}
          <span style="color:#ccc;">없음</span>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
